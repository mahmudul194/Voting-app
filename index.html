<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voting Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <!-- LOGIN SECTION -->
    <div id="loginSection">
      <h1>🗳 Login to Vote</h1>
      <input type="text" id="name" placeholder="Name" />
      <input type="text" id="student_id" placeholder="Student ID (e.g., 232-35-001)" />
      <input type="text" id="section" placeholder="Section (L only)" />
      <input type="text" id="batch" placeholder="Batch" />
      <button onclick="login()">Login</button>
    </div>

    <!-- VOTING SECTION -->
    <div id="votingSection" style="display: none;">
      <h1>🗳 CR Selection</h1>
      <div class="button-group">
        <button onclick="vote('Sabreena')">Vote for Sabreena</button>
        <button onclick="vote('Azaz')">Vote for Azaz</button>
      </div>

      <div id="results"></div>
      
      <div class="actions">
        <button id="endVote">Show Results</button>
        <button id="removeVoteBtn">Remove My Vote</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
