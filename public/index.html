<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voting Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🗳 CR Selection</h1>

    <!-- LOGIN SECTION -->
    <div id="loginSection">
      <input id="name" placeholder="Name" />
      <input id="student_id" placeholder="232-35-xxx" />
      <input id="section" placeholder="Section (L only)" />
      <input id="batch" placeholder="Batch" />
      <button onclick="login()">Login</button>
    </div>

    <!-- VOTING SECTION -->
    <div id="votingSection" style="display:none;">
      <div class="button-group">
        <button onclick="vote('Sabreena')">Vote for Sabreena</button>
        <button onclick="vote('Azaz')">Vote for Azaz</button>
      </div>

      <div id="results"></div>

      <div class="actions">
        <button id="endVote">Show Results</button>
        <button id="removeVoteBtn">Remove Vote</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
